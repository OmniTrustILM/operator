sonar.projectKey=OmniTrustILM_operator
sonar.organization=omnitrust-ilm

# Source and test configuration
sonar.sources=api,cmd,internal
sonar.tests=internal
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/*_test.go,**/zz_generated*.go,test/**

# Coverage
sonar.go.coverage.reportPaths=cover.out

# Lint report (golangci-lint checkstyle format)
sonar.go.golangci-lint.reportPaths=golangci-lint-report.xml

# Quality gate
sonar.qualitygate.wait=true

# Duplication
sonar.cpd.minimumTokens=100
