{{- if .Values.crd.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: connectors.otilm.com
spec:
  group: otilm.com
  names:
    kind: Connector
    listKind: ConnectorList
    plural: connectors
    shortNames:
    - conn
    singular: connector
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.readyReplicas
      name: Ready
      type: string
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Connector is the Schema for the connectors API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConnectorSpec defines the desired state of Connector.
            properties:
              configMapRefs:
                description: ConfigMapRefs defines references to Kubernetes configmaps.
                items:
                  description: ConfigMapRef defines a reference to a Kubernetes configmap.
                  properties:
                    keys:
                      description: Keys defines the individual key mappings from the
                        configmap.
                      items:
                        description: ConfigMapKeyMapping defines the mapping of a
                          key from a configmap.
                        properties:
                          configMapKey:
                            description: ConfigMapKey is the key in the configmap
                              to reference.
                            type: string
                          envVar:
                            description: EnvVar is the environment variable name to
                              map to (for env type).
                            type: string
                          path:
                            description: Path is the file path to mount to (for volume
                              type).
                            type: string
                        type: object
                      type: array
                    mountPath:
                      description: MountPath is the path to mount the configmap (required
                        when type=volume).
                      type: string
                    name:
                      description: Name is the name of the configmap.
                      type: string
                    type:
                      allOf:
                      - enum:
                        - env
                        - volume
                      - enum:
                        - env
                        - volume
                      description: Type defines how the configmap is consumed (env
                        or volume).
                      type: string
                  required:
                  - name
                  - type
                  type: object
                type: array
              env:
                description: Env defines environment variables for the connector.
                items:
                  description: EnvVar defines an environment variable for the connector.
                  properties:
                    name:
                      description: Name is the environment variable name.
                      type: string
                    value:
                      description: Value is the environment variable value.
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              image:
                description: Image defines the container image configuration.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines the image pull policy.
                    type: string
                  pullSecrets:
                    description: PullSecrets is a list of secret names for pulling
                      the image.
                    items:
                      type: string
                    type: array
                  repository:
                    description: Repository is the container image repository.
                    minLength: 1
                    type: string
                  tag:
                    description: Tag is the container image tag.
                    minLength: 1
                    type: string
                required:
                - repository
                - tag
                type: object
              lifecycle:
                description: Lifecycle defines lifecycle management settings.
                properties:
                  podDisruptionBudget:
                    description: PodDisruptionBudget defines the PDB configuration.
                    properties:
                      enabled:
                        description: Enabled indicates whether a PodDisruptionBudget
                          should be created.
                        type: boolean
                      minAvailable:
                        anyOf:
                        - type: integer
                        - type: string
                        description: MinAvailable is the minimum number/percentage
                          of pods that must be available.
                        x-kubernetes-int-or-string: true
                    required:
                    - enabled
                    type: object
                  terminationGracePeriodSeconds:
                    description: TerminationGracePeriodSeconds is the duration in
                      seconds the pod needs to terminate gracefully.
                    format: int64
                    type: integer
                type: object
              metrics:
                description: Metrics defines the metrics configuration.
                properties:
                  enabled:
                    description: Enabled indicates whether metrics are enabled.
                    type: boolean
                  path:
                    default: /v1/metrics
                    description: Path is the HTTP path for metrics endpoint.
                    type: string
                  port:
                    default: 8080
                    description: Port is the port for the metrics endpoint.
                    format: int32
                    type: integer
                  serviceMonitor:
                    description: ServiceMonitor defines the ServiceMonitor configuration.
                    properties:
                      enabled:
                        description: Enabled indicates whether a ServiceMonitor should
                          be created.
                        type: boolean
                      interval:
                        description: Interval defines the scrape interval.
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: Labels are additional labels to add to the ServiceMonitor.
                        type: object
                    required:
                    - enabled
                    type: object
                required:
                - enabled
                type: object
              probes:
                description: Probes defines the probe configuration for the connector.
                properties:
                  liveness:
                    description: Liveness defines the liveness probe configuration.
                    properties:
                      failureThreshold:
                        description: FailureThreshold is the number of consecutive
                          failures before the probe is considered failed.
                        format: int32
                        type: integer
                      initialDelaySeconds:
                        description: InitialDelaySeconds is the number of seconds
                          after the container starts before the probe is initiated.
                        format: int32
                        type: integer
                      path:
                        description: Path is the HTTP path to probe.
                        type: string
                      periodSeconds:
                        description: PeriodSeconds is how often (in seconds) to perform
                          the probe.
                        format: int32
                        type: integer
                    type: object
                  readiness:
                    description: Readiness defines the readiness probe configuration.
                    properties:
                      failureThreshold:
                        description: FailureThreshold is the number of consecutive
                          failures before the probe is considered failed.
                        format: int32
                        type: integer
                      initialDelaySeconds:
                        description: InitialDelaySeconds is the number of seconds
                          after the container starts before the probe is initiated.
                        format: int32
                        type: integer
                      path:
                        description: Path is the HTTP path to probe.
                        type: string
                      periodSeconds:
                        description: PeriodSeconds is how often (in seconds) to perform
                          the probe.
                        format: int32
                        type: integer
                    type: object
                  startup:
                    description: Startup defines the startup probe configuration.
                    properties:
                      failureThreshold:
                        description: FailureThreshold is the number of consecutive
                          failures before the probe is considered failed.
                        format: int32
                        type: integer
                      initialDelaySeconds:
                        description: InitialDelaySeconds is the number of seconds
                          after the container starts before the probe is initiated.
                        format: int32
                        type: integer
                      path:
                        description: Path is the HTTP path to probe.
                        type: string
                      periodSeconds:
                        description: PeriodSeconds is how often (in seconds) to perform
                          the probe.
                        format: int32
                        type: integer
                    type: object
                type: object
              registration:
                description: Registration defines the platform registration configuration.
                properties:
                  authAttributes:
                    description: AuthAttributes defines authentication-related attributes.
                    items:
                      description: RegistrationAttribute defines a name/value pair
                        for registration attributes.
                      properties:
                        content:
                          description: Content is the arbitrary JSON value of the
                            attribute.
                          x-kubernetes-preserve-unknown-fields: true
                        name:
                          description: Name is the attribute name.
                          type: string
                      required:
                      - content
                      - name
                      type: object
                    type: array
                  authType:
                    allOf:
                    - enum:
                      - none
                      - basic
                      - certificate
                      - apiKey
                      - jwt
                    - enum:
                      - none
                      - basic
                      - certificate
                      - apiKey
                      - jwt
                    description: AuthType defines the authentication type for registration.
                    type: string
                  customAttributes:
                    description: CustomAttributes defines custom registration attributes.
                    items:
                      description: RegistrationAttribute defines a name/value pair
                        for registration attributes.
                      properties:
                        content:
                          description: Content is the arbitrary JSON value of the
                            attribute.
                          x-kubernetes-preserve-unknown-fields: true
                        name:
                          description: Name is the attribute name.
                          type: string
                      required:
                      - content
                      - name
                      type: object
                    type: array
                  name:
                    description: Name is the registration name of the connector.
                    type: string
                  platformUrl:
                    description: PlatformUrl is the URL of the platform to register
                      with.
                    type: string
                required:
                - authType
                - name
                - platformUrl
                type: object
              replicas:
                default: 1
                description: Replicas is the number of desired replicas.
                format: int32
                minimum: 0
                type: integer
              resources:
                description: Resources defines the compute resource requirements.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              secretRefs:
                description: SecretRefs defines references to Kubernetes secrets.
                items:
                  description: SecretRef defines a reference to a Kubernetes secret.
                  properties:
                    keys:
                      description: Keys defines the individual key mappings from the
                        secret.
                      items:
                        description: RefKeyMapping defines the mapping of a key from
                          a secret or configmap.
                        properties:
                          envVar:
                            description: EnvVar is the environment variable name to
                              map to (for env type).
                            type: string
                          path:
                            description: Path is the file path to mount to (for volume
                              type).
                            type: string
                          secretKey:
                            description: SecretKey is the key in the secret to reference.
                            type: string
                        type: object
                      type: array
                    mountPath:
                      description: MountPath is the path to mount the secret (required
                        when type=volume).
                      type: string
                    name:
                      description: Name is the name of the secret.
                      type: string
                    type:
                      allOf:
                      - enum:
                        - env
                        - volume
                      - enum:
                        - env
                        - volume
                      description: Type defines how the secret is consumed (env or
                        volume).
                      type: string
                  required:
                  - name
                  - type
                  type: object
                type: array
              securityContext:
                description: SecurityContext defines the security context for the
                  connector pod.
                properties:
                  readOnlyRootFilesystem:
                    default: true
                    description: ReadOnlyRootFilesystem indicates that the container
                      has a read-only root filesystem.
                    type: boolean
                  runAsNonRoot:
                    default: true
                    description: RunAsNonRoot indicates that the container must run
                      as a non-root user.
                    type: boolean
                type: object
              service:
                description: Service defines the service configuration.
                properties:
                  port:
                    default: 8080
                    description: Port is the service port.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  type:
                    default: ClusterIP
                    description: Type is the Kubernetes service type.
                    enum:
                    - ClusterIP
                    - NodePort
                    - LoadBalancer
                    type: string
                type: object
              volumes:
                description: Volumes defines additional volumes for the connector
                  pod.
                items:
                  description: VolumeSpec defines a volume to mount in the connector
                    pod.
                  properties:
                    emptyDir:
                      description: EmptyDir defines the emptyDir volume source.
                      properties:
                        medium:
                          description: Medium is the storage medium type (e.g., "",
                            "Memory").
                          type: string
                        sizeLimit:
                          description: SizeLimit is the maximum size of the emptyDir
                            volume.
                          type: string
                      type: object
                    mountPath:
                      description: MountPath is the path to mount the volume in the
                        container.
                      type: string
                    name:
                      description: Name is the name of the volume.
                      type: string
                  required:
                  - mountPath
                  - name
                  type: object
                type: array
            required:
            - image
            - service
            type: object
          status:
            description: ConnectorStatus defines the observed state of Connector.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the Connector's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configChecksum:
                description: ConfigChecksum is a checksum of the current configuration.
                type: string
              currentImage:
                description: CurrentImage is the currently deployed container image.
                type: string
              endpoint:
                description: Endpoint is the service endpoint for the connector.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed.
                format: int64
                type: integer
              phase:
                description: Phase is the current phase of the Connector.
                type: string
              readyReplicas:
                description: ReadyReplicas is the number of ready replicas.
                format: int32
                type: integer
              registration:
                description: Registration is the observed registration status.
                properties:
                  registeredAt:
                    description: RegisteredAt is the timestamp when the connector
                      was registered.
                    format: date-time
                    type: string
                  status:
                    description: Status is the current registration status.
                    type: string
                  uuid:
                    description: UUID is the unique identifier assigned by the platform.
                    type: string
                type: object
              replicas:
                description: Replicas is the total number of replicas.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
