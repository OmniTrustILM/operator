version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - ineffassign
    - dupl
    - goconst
    - revive
    - misspell
    - goimports
    - unconvert
    - unparam
    - bodyclose
    - noctx
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
    - path: zz_generated
      linters:
        - all
