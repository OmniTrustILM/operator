apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
  name: ilm-operator.v0.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Connector is the Schema for the connectors API.
      displayName: Connector
      kind: Connector
      name: connectors.otilm.com
      resources:
      - kind: Deployments
        name: ""
        version: apps/v1
      - kind: PodDisruptionBudgets
        name: ""
        version: policy/v1
      - kind: ServiceAccounts
        name: ""
        version: v1
      - kind: Services
        name: ""
        version: v1
      version: v1alpha1
  description: |
    The ILM Operator manages ILM platform connectors via Kubernetes Custom
    Resource Definitions. It automates the deployment, configuration, and
    lifecycle management of connector workloads, including service creation,
    health probes, metrics integration, and platform registration.
  displayName: ILM Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - ilm
  - operator
  - connector
  - kubernetes
  - certificate
  - identity
  links:
  - name: Documentation
    url: https://docs.otilm.com
  - name: Source Code
    url: https://github.com/OmniTrustILM/operator
  maintainers:
  - email: support@otilm.com
    name: OmniTrust ILM
  maturity: alpha
  minKubeVersion: 1.28.0
  provider:
    name: OmniTrust ILM
    url: https://otilm.com
  version: 0.0.1
