apiVersion: otilm.com/v1alpha1
kind: Connector
metadata:
  name: x509-compliance-provider
  namespace: default
spec:
  image:
    repository: docker.io/czertainly/czertainly-x509-compliance-provider
    tag: "2.13.0"
  service:
    port: 8080
  env:
    - name: SERVER_PORT
      value: "8080"
    - name: LOG_LEVEL
      value: "INFO"
