name: Test Chart
on:
  pull_request:
    paths:
      - 'deploy/charts/**'
    branches: [ main ]
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Detect Changed Charts
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch main --chart-dirs deploy/charts)
          echo "${changed}"

          if [[ -n "$changed" ]]; then
            echo "✅ Charts changed"
            echo "changed=true" >> $GITHUB_ENV

            echo "changed_charts<<EOF" >> $GITHUB_ENV
            echo "$changed" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ℹ️ No chart changes detected"
            echo "changed=false" >> $GITHUB_ENV
          fi

      - name: Skip testing when no charts changed
        if: env.changed != 'true'
        run: echo "ℹ️ No chart changes detected — skipping install tests." && exit 0

      - name: Check for Development Versions (Non-release PRs)
        if: env.changed == 'true' && !startsWith(github.head_ref, 'release')
        env:
          changed_charts: ${{ env.changed_charts }}
        run: |
          for CHART in $changed_charts; do
            echo "🔍 Checking chart $CHART for development version"
            version=$(yq ".version" < "${CHART}/Chart.yaml")
            if [[ $version != *-develop ]]; then
              echo "❌ Chart $CHART has version '$version' but should be a development version (*-develop)"
              exit 1
            fi
          done

      - name: Check for Non-Develop Versions (Release PRs)
        if: env.changed == 'true' && startsWith(github.head_ref, 'release')
        env:
          changed_charts: ${{ env.changed_charts }}
        run: |
          for CHART in $changed_charts; do
            echo "🔍 Checking chart $CHART for release-ready version"
            version=$(yq ".version" < "${CHART}/Chart.yaml")
            if [[ $version == *-develop ]]; then
              echo "❌ Chart $CHART has development version '$version' in a release branch"
              exit 1
            fi
          done

      - name: Run chart-testing (lint)
        if: env.changed == 'true'
        run: ct lint --target-branch main --chart-dirs deploy/charts --check-version-increment=false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: env.changed == 'true'

      - name: Create testing namespace
        if: env.changed == 'true'
        run: kubectl create namespace chart-testing

      - name: Run chart-testing (install)
        if: env.changed == 'true'
        run: |
          ct install --namespace chart-testing --target-branch main --chart-dirs deploy/charts
