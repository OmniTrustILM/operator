name: Publish Docker image

on:
  push:
    paths-ignore:
      - 'deploy/charts/**'
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}-harbor
  cancel-in-progress: true

jobs:
  publish:
    uses: OmniTrustILM/.github/.github/workflows/containers-build-and-push.yml@main
    secrets: inherit
    with:
      image: ilm/operator
      cache-scope: operator
      build-args: |
        VERSION=${{ github.ref_name }}
