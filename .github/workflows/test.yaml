name: Test

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'deploy/charts/**'
  pull_request:
    paths-ignore:
      - 'deploy/charts/**'
    branches: [ main ]

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run tests with coverage
        run: make test
      - name: Verify coverage threshold
        run: |
          total=$(go tool cover -func=cover.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          if [ "$(echo "$total < 80" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below 80% threshold"
            exit 1
          fi

      # Upload artifacts for downstream Sonar workflow
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: cover.out
          if-no-files-found: error

      - name: Prepare PR context artifact
        if: github.event_name == 'pull_request'
        run: |
          cat > pr-context.json <<'JSON'
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "head_sha":  "${{ github.event.pull_request.head.sha }}",
            "head_repo": "${{ github.event.pull_request.head.repo.full_name }}",
            "head_branch": "${{ github.event.pull_request.head.ref }}",
            "base_ref": "${{ github.event.pull_request.base.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          JSON

      - name: Upload PR context
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-context
          path: pr-context.json
          retention-days: 1
          if-no-files-found: error

      # Run SonarCloud directly on push to main (has access to secrets)
      - name: SonarCloud Scan (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build Docker image
        run: make docker-build

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run E2E tests
        run: make -j1 kind-cluster docker-build kind-load deploy test-e2e
      - name: Export logs on failure
        if: failure()
        run: make kind-export-logs
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-logs
          path: /tmp/ilm-operator-e2e-logs/
      - name: Cleanup
        if: always()
        run: make prune-kind-cluster
